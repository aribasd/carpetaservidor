<html>

<head>

<title>Data Naixament</title>

</head>

<body>

<script>

let escorrecte = false;

let datanaixament;

while (!escorrecte) 
{

datanaixament = prompt("Quina és la teva data de naixament, Exemple: 23/4/2006");
    
let data = /^\d{1,2}\/\d{1,2}\/\d{4}$/;

if (data.test(datanaixament)) 
{
escorrecte = true;
}

else 
{
alert("No té el format correcte");
}

}

let parts = datanaixament.split("/");

dia = parts[0];
mes = parts[1] -1;
any = parts[2];


let dataDate = new Date(any, mes, dia);

let diaquevasniexer = dataDate.getDay(); 

const diesSetmana = ["Diumenge","Dilluns","Dimarts","Dimecres","Dijous","Divendres","Dissabte"];

let anyactual = new Date().getFullYear();

let edat = anyactual - any;

alert("Vas néixer un " + diesSetmana[diaquevasniexer]); 

alert("Tens" + any[anyactual]);

</script>

</body>

</html>
