    <!DOCTYPE html>

    <html lang="es">

    <head>

    <title>Contrasenya Segura</title>

    </head>

    <body>


    <h1>Comprobant de contrasenya</h1>

    <script>


    let contrasenya = prompt()
        
   //Comprobacio
    
    let lacontrasenyasegura = true
    
    let vocals = ["a", "e" , "i", "o", "u"]
    
    contrasenya = contrasenya.toLowerCase()

    let algunavocal = false;


    for (let i = 0; i < contrasenya.length;i++)
    {
        if (vocals.includes(contrasenya[i]))
    {
        algunavocal = true;
    }
    }

    if (algunavocal === false)
    {
        alert("Necessita tenir almenys una vocal.")
    }


    let consonants =  ["b","c","d","f","g","h","j","k","l","m","n","p","q","r","s","t","v","w","x","y","z"]

    let contadorVocals = 0;

    let contadorsConsonants = 0;


    let tetresvocalsjuntes = false;

    let tetresconsonantsjuntes = false;


   for (let index = 0; index < contrasenya.length; index++)
   {
    if (vocals.includes(contrasenya[index])) {
        
        contadorVocals++;
    if (contadorVocals === 3) {
    
        lacontrasenyasegura = false;
        tetresvocalsjuntes = true;

   }
}
   else {
     contadorVocals = 0;
   }

   if (consonants.includes(contrasenya[index]))
   {
    contadorsConsonants++;

    if (contadorsConsonants === 3)
   {
    lacontrasenyasegura = false;
    tetresconsonantsjuntes = true;

   }
   }
   else {
    contadorsConsonants = 0;
   }
}


if (tetresvocalsjuntes)
{
 alert("No pot tenir tres vocals juntes");
}

if (tetresconsonantsjuntes)
{
    alert("No pot tenir tres consonants juntes");
}



let hihanocurrencies = false;

let primercaracter = contrasenya[0];

for (let j = 1; j < contrasenya.length; j++)
{
    if (contrasenya[j] === contrasenya[j-1] && contrasenya[j] !== "o" && contrasenya[j] !== "e") {

            lacontrasenyasegura = false;
             hihanocurrencies = true;
    }
}

if (hihanocurrencies)
{
 alert("No pot tenir dos ocurrències juntes");
}

    let contador = contrasenya.length;

    if (contador < 6)
    {
     alert("La contrasenya no pot tenir menys de 6 caràcters");
     lacontrasenyasegura = false;
    }

    if (contador > 10)
    {
        alert("La contrasenya no pot tenir més de 10 caracters")
        lacontrasenyasegura = false;
    }

   let teEspais = false;
    for (let i = 0; i < contrasenya.length; i++) {
    if (contrasenya[i] === " ") {
        teEspais = true;
        }
    }

    if (teEspais) {
    alert("La contrasenya no pot contenir espais en blanc.");
    lacontrasenyasegura = false;
    }

    
    // Acabarem mostrant

    if (lacontrasenyasegura && algunavocal)
    {
        alert("La contrasenta compleix amb tot i és segura");
    }

    else 
    {
    alert ("La contrasenya no és segura");
    }



    </script>    

    </body>

    </html>
