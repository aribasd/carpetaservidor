    <!DOCTYPE html>

    <html lang="es">

    <head>

    <title>Contrasenya Segura</title>

    </head>

    <body>

     <div id=car></div>   

    

    <script>

    let contrasenya = prompt()
        
    let caracter = document.getElementById("car")


    caracter.innerHTML = contrasenya.at(2)

   //Comprobacio
    
    let lacontrasenyasegura = false
    
    let vocals = ["a", "e" , "i", "o", "u"]
    
    contrasenya = contrasenya.toLowerCase()


    for (let i = 0; i < contrasenya.length;i++)
    {
        if (vocals.includes(contrasenya[i]))
    {
        lacontrasenyasegura = true;
    }
    }



    // Acabarem mostrar

    if (lacontrasenyasegura)
    {
        alert("La contrasenta compleix amb tot i és segura");
    }

    else 
    {
    alert ("La contrasenya no es segura");
    }







    </script>    

    </body>

    </html>
