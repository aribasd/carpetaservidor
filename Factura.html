<!DOCTYPE html>
<html>
<head>
    <title>Factura</title>
    <link rel="stylesheet" href="Factura.css">
</head>
<body>

    <h1>Factura</h1>

<form>
 <div class="primer">  
    <label>Producte 1</label>  
    <input type="number" id="preuPrimer" placeholder="Preu del Producte €"> 
    <div id="primerIva">IVA: 0€</div>
</div>

 <div class="segon">
    <label>Producte 2</label>
    <input type="number" id="preuSegon" placeholder="Preu del Producte €"> 
    <div id="segonIva">IVA: 0€</div>
</div>
    <div class="tercer">
    <label>Producte 3</label>
    <input type="number" id="preuTercer" placeholder="Preu del Producte €"> 
     <div id="tercerIva">IVA: 0€</div>
</div>
 <div class="quart">
    <label>Producte 4</label>
    <input type="number" id="preuQuart" placeholder="Preu del Producte €"> 
 <div id="quartIva">IVA: 0€</div>
</div>
 <div class="cinquer">
    <label>Producte 5</label>
    <input type="number" id="preuCinquer" placeholder="Preu del Producte €">
<div id="cinquerIva">IVA: 0€</div>
 </div>
</form>

<div id="preuTotal"></div>

<script>

const IVA = 21; 

function calcularIva(input, output) {
    const preu = Number(input.value);
    const ivaCalculat = preu * IVA / 100;
    output.textContent = ivaCalculat;
}

const preuPrimer = document.getElementById("preuPrimer");
const primerIva = document.getElementById("primerIva");

const preuSegon = document.getElementById("preuSegon");
const segonIva = document.getElementById("segonIva");

const preuTercer = document.getElementById("preuTercer");
const tercerIva = document.getElementById("tercerIva");

const preuQuart = document.getElementById("preuQuart");
const quartIva = document.getElementById("quartIva");

const preuCinquer = document.getElementById("preuCinquer");
const cinquerIva = document.getElementById("cinquerIva");


const preuTotal = document.getElementById("preuTotal");

preuPrimer.addEventListener("input", () => 

calcularIva(preuPrimer, primerIva)

);

preuSegon.addEventListener("input", () => 

calcularIva(preuSegon, segonIva)

);

preuTercer.addEventListener("input", () => 

calcularIva(preuTercer, tercerIva)

);

preuQuart.addEventListener("input", () => 

calcularIva(preuQuart, quartIva)

);

preuCinquer.addEventListener("input", () => 

calcularIva(preuCinquer, cinquerIva)

);

preuPrimer.addEventListener("input", preuSumarTot);
preuSegon.addEventListener("input", preuSumarTot);
preuTercer.addEventListener("input", preuSumarTot);
preuQuart.addEventListener("input", preuSumarTot);
preuCinquer.addEventListener("input", preuSumarTot);

function preuSumarTot() {
    const val1 = Number(preuPrimer.value);
    const val2 = Number(preuSegon.value);
    const val3 = Number(preuTercer.value);
    const val4 = Number(preuQuart.value);
    const val5 = Number(preuCinquer.value);
    preuTotal.textContent = "Total: " + (val1 + val2 + val3 + val4 + val5) + "€";
}

</script>
</body>
</html>
