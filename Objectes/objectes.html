<html>

<head>
<title>Objectes</title>
<link rel = "stylesheet" href="objectes.css" >
</head>

<body>

<div class="form">
  <h2 class="form-title">Comprovar Dades</h2>

  <form>
    <div class="input-container">
      <input type="text" id="nom" name="nom" placeholder="Nom" required>
    </div>
    <div class="input-container">
      <input type="text" id="cognoms" name="cognoms" placeholder="Cognoms" required>
    </div>
    <div class="input-container">
      <input type="number" id="telefon" name="telefon" placeholder="Telèfon" required>
    </div>
    <div class="input-container">
      <input type="email" id="correu" name="correu" placeholder="Correu">
    </div>
    <div class="input-container">
      <input type="text" id="dni" name="dni" placeholder="DNI/NIE" required>
    </div>
    <div class="input-container">
      <label for="nacionalidad">Nacionalidad:</label>
      <select id="nacionalidad" name="nacionalidad">
        <option value="">-- Selecciona un país --</option>
        <option value="ES">España</option>
        <option value="FR">Francia</option>
        <option value="DE">Alemania</option>
        <option value="GB">Reino Unido</option>
        <option value="IT">Italia</option>
        <option value="PT">Portugal</option>
        <option value="NL">Países Bajos</option>
        <option value="BE">Bélgica</option>
        <option value="CH">Suiza</option>
        <option value="IE">Irlanda</option>
        <option value="SE">Suecia</option>
        <option value="NO">Noruega</option>
        <option value="US">Estados Unidos</option>
        <option value="MX">México</option>
        <option value="AR">Argentina</option>
        <option value="CO">Colombia</option>
        <option value="BR">Brasil</option>
        <option value="MA">Marruecos</option>
        <option value="CN">China</option>
        <option value="JP">Japón</option>
      </select>
    </div>

    <button type="button" class="submit" onclick="comprobardni()">Enviar Dades</button>
  </form>
</div>


<div id="missatge"></div>


<script>

let ordenat = false;


function comprobardni() {
  const dni = document.getElementById("dni").value.toUpperCase();
  const validacio = /^[XYZ]?\d{7,8}[A-HJ-NP-TV-Z]$/;

  if (!validacio.test(dni)) {

    alert("DNI/NIE no válido");
    return;
  }

  else {
          alert("El DNI és correcte");
          ordenat = true;
       }


    if(ordenat){
        $('#missatge').html('<h1></h1>');
    } else {
         $('#missatge').text('');
    }

}

    
</script>

</body>

</html>
